<html lang="vi">

  <script src="https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <style>
    body{margin:0;background:#0e1117;color:white;font-family:'Segoe UI',sans-serif;}
    *{box-sizing:border-box;}
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
  (function(){
    var {useState,useEffect,useRef,useCallback}=React;
    var {BarChart,Bar,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,PieChart,Pie,Cell,RadarChart,Radar,PolarGrid,PolarAngleAxis,ComposedChart,LabelList,LineChart,Line}=window.Recharts;
    var h=React.createElement;

    var C1=["#3b82f6","#10b981","#8b5cf6","#f59e0b","#ef4444","#06b6d4","#ec4899","#6366f1","#84cc16","#f97316"];
    var TOC=["#3b82f6","#10b981","#f59e0b","#ec4899","#8b5cf6"];
    var TOL=["Tổ 1","Tổ 2","Tổ 3","Tổ 4","Tổ 5"];
    var STL=["Mới","Tiếp cận","Quan tâm","Xét Học bạ","Fail"];
    var HC=["#ef4444","#f59e0b","#10b981","#3b82f6","#8b5cf6","#06b6d4"];
    var TT={contentStyle:{background:"#1e2130",border:"1px solid #2d3148",borderRadius:8,color:"#e8eaf0",fontSize:11}};
    var POLL=30,PAGE=10;
    var NAV=[{id:"funnel",label:"TIẾN TRÌNH",icon:"①"},{id:"kenh",label:"KÊNH TUYỂN SINH",icon:"②"},{id:"diem",label:"ĐIỂM SỐ & NGÀNH",icon:"③"},{id:"dialy",label:"ĐỊA LÝ & TRƯỜNG",icon:"④"},{id:"phanloai",label:"PHÂN TÍCH 3 LOẠI ĐIỂM",icon:"⑤"},{id:"data",label:"DỮ LIỆU",icon:"📋"},{id:"ai",label:"AI INSIGHT",icon:"🤖"},{id:"upload",label:"UPLOAD",icon:"📁"}];

    function rng(s){var x=Math.sin(s+1)*10000;return x-Math.floor(x);}
    var MOCK=Array.from({length:200},function(_,i){
      return{_id:"c"+i,name:"Thí sinh "+(i+1),phone:"09"+String(i).padStart(8,"0"),
        province:["Hồ Chí Minh","Bình Dương","Đồng Nai","Tiền Giang","Long An","Bình Thuận","Tây Ninh","Bà Rịa - VT","Vĩnh Long","An Giang"][i%10],
        major:["CNTT","Kinh tế","Quản trị","Y dược","Luật","Kế toán","Marketing","Du lịch","Khách sạn","Ngôn ngữ Anh"][i%10],
        status:STL[Math.floor(rng(i)*5)],telesales:TOL[i%5],
        kenh:["Nguồn Offline","Zalo Collect","Nguồn Online","Mua list giới thiệu","Ngày hội"][i%5],
        cccd:i%7===0?"":"OK",email:i%6===0?"":"ok@gmail.com",
        diem_tbm:Math.round((6+rng(i+100)*4)*100)/100,
        diem_tohop:Math.round((18+rng(i+200)*12)*100)/100,
        diem_dgnl:Math.round(600+rng(i+300)*400),
        xhb:i%3===0?"Không XHB":"Có XHB",
        created_at:new Date(Date.now()-i*172800000).toISOString().split("T")[0]};
    });

    function BL(props){
      var x=props.x,y=props.y,w=props.width,v=props.value;
      if(!v||w<18)return null;
      var label=Number(v).toLocaleString();
      if(label.length*2>w*0.95)return null;
      return h("text",{x:x+w/2,y:y-4,fill:"#e8eaf0",textAnchor:"middle",fontSize:10,fontWeight:600},label);
    }
    function PL(props){
      var cx=props.cx,cy=props.cy,ma=props.midAngle,ir=props.innerRadius,or=props.outerRadius,v=props.value,p=props.percent;
      if(p<0.04)return null;
      var R=Math.PI/180,r=ir+(or-ir)*0.5,x=cx+r*Math.cos(-ma*R),y=cy+r*Math.sin(-ma*R);
      return h("text",{x,y,fill:"#fff",textAnchor:"middle",dominantBaseline:"central",fontSize:11,fontWeight:700},v);
    }
    function KCard({val,label,pct,color}){
      var c=color||"#3b82f6";
      return h("div",{style:{background:"#1a1f35",border:"1px solid "+c+"44",borderRadius:10,padding:"14px 18px",flex:1,minWidth:140}},
        h("div",{style:{fontSize:28,fontWeight:800,color:c,lineHeight:1,marginBottom:4}},val),
        h("div",{style:{fontSize:11,color:"#8b92a9",textTransform:"uppercase",letterSpacing:".5px",marginBottom:2}},label),
        pct&&h("div",{style:{fontSize:11,color:"#8b92a9"}},pct)
      );
    }
    function SC({title,sub,style,onExpand,children}){
      return h("div",{style:Object.assign({background:"#161b2e",border:"1px solid #2d3148",borderRadius:10,padding:"16px 20px"},style||{})},
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:sub?2:12}},
          h("div",null,
            title&&h("div",{style:{fontWeight:700,color:"#e8eaf0",fontSize:13}},title),
            sub&&h("div",{style:{fontSize:11,color:"#8b92a9",marginTop:2}},sub)
          ),
          onExpand&&h("button",{onClick:onExpand,style:{background:"transparent",border:"1px solid #2d3148",color:"#8b92a9",borderRadius:6,width:28,height:28,cursor:"pointer",fontSize:14,flexShrink:0,marginLeft:8}},"⛶")
        ),
        children
      );
    }
    function Tag({onClick,active,children}){
      return h("button",{onClick,style:{background:active?"#3b82f6":"#1e2130",border:"1px solid "+(active?"#3b82f6":"#2d3148"),color:active?"#fff":"#8b92a9",borderRadius:20,padding:"5px 14px",fontSize:12,fontWeight:active?600:400,display:"flex",alignItems:"center",gap:6,whiteSpace:"nowrap",cursor:"pointer"}},children);
    }
    function Modal({modal,onClose}){
      if(!modal)return null;
      return h("div",{onClick:onClose,style:{position:"fixed",inset:0,background:"rgba(0,0,0,.8)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:24}},
        h("div",{onClick:function(e){e.stopPropagation();},style:{background:"#161b2e",border:"1px solid #2d3148",borderRadius:14,padding:"20px 24px",width:"100%",maxWidth:1000,maxHeight:"90vh",overflow:"auto"}},
          h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}},
            h("div",null,
              h("div",{style:{fontWeight:700,color:"#e8eaf0",fontSize:16}},modal.title),
              modal.sub&&h("div",{style:{fontSize:12,color:"#8b92a9",marginTop:2}},modal.sub)
            ),
            h("button",{onClick:onClose,style:{background:"#2d3148",border:"none",color:"#c8cde0",borderRadius:6,width:32,height:32,cursor:"pointer",fontSize:18}},"×")
          ),
          modal.content
        )
      );
    }

    var inp={background:"#1e2130",border:"1px solid #2d3148",color:"#c8cde0",borderRadius:6,padding:"6px 10px",fontSize:12};
    var thS={color:"#8b92a9",fontWeight:600,padding:"7px 10px",textAlign:"left",fontSize:10,textTransform:"uppercase",borderBottom:"1px solid #2d3148",cursor:"pointer",whiteSpace:"nowrap"};
    var tdS={padding:"6px 10px",color:"#c8cde0",verticalAlign:"middle",fontSize:11};

    function App(){
      var [currentTab,setCurrentTab]=useState("funnel");
      var [data,setData]=useState([]);
      var [st,setSt]=useState("idle");
      var [mock,setMock]=useState(true);
      var [cd,setCd]=useState(POLL);
      var [filterTo,setFilterTo]=useState("Tất cả");
      var [fSt,setFSt]=useState("Tất cả");
      var [fTs,setFTs]=useState("Tất cả");
      var [fTinh,setFTinh]=useState("Tất cả");
      var [srch,setSrch]=useState("");
      var [sCol,setSCol]=useState("created_at");
      var [sDir,setSDir]=useState("desc");
      var [pg,setPg]=useState(1);
      var [aiTxt,setAiTxt]=useState("");
      var [aiLd,setAiLd]=useState(false);
      var [uploadMsg,setUploadMsg]=useState("");
      var [uploadPct,setUploadPct]=useState(0);
      var [modal,setModal]=useState(null);
      var timerRef=useRef(null),cdRef=useRef(null),fileRef=useRef(null);

      var active=mock?MOCK:data;
      var af=active.filter(function(x){
        return(filterTo==="Tất cả"||x.telesales===filterTo)&&(fTinh==="Tất cả"||x.province===fTinh);
      });
      var total=af.length;
      var byStatus=STL.map(function(s){return{name:s,v:af.filter(function(x){return x.status===s;}).length};});
      var xhb=af.filter(function(x){return x.status==="Xét Học bạ";}).length;
      var tiepcan=af.filter(function(x){return x.status==="Tiếp cận";}).length;
      var fail=af.filter(function(x){return x.status==="Fail";}).length;
      var byTo=TOL.map(function(t){var rows=af.filter(function(x){return x.telesales===t;});var obj={name:t,total:rows.length,xhb:rows.filter(function(x){return x.status==="Xét Học bạ";}).length};STL.forEach(function(s){obj[s]=rows.filter(function(x){return x.status===s;}).length;});return obj;});
      var byTinhMap={};af.forEach(function(x){if(x.province)byTinhMap[x.province]=(byTinhMap[x.province]||0)+1;});
      var byTinh=Object.keys(byTinhMap).map(function(k){return{name:k,value:byTinhMap[k]};}).sort(function(a,b){return b.value-a.value;});
      var byTinhStack=byTinh.slice(0,10).map(function(t){
        var obj={name:t.name};
        STL.forEach(function(s){obj[s]=af.filter(function(x){return x.province===t.name&&x.status===s;}).length;});
        return obj;
      });
      var byKenhMap={};af.forEach(function(x){if(x.kenh)byKenhMap[x.kenh]=(byKenhMap[x.kenh]||0)+1;});
      var byKenh=Object.keys(byKenhMap).map(function(k){return{name:k,total:byKenhMap[k],xhb:af.filter(function(x){return x.kenh===k&&x.status==="Xét Học bạ";}).length};});
      var majorMap={};af.forEach(function(x){if(x.major){if(!majorMap[x.major])majorMap[x.major]={sum:0,cnt:0};majorMap[x.major].sum+=(x.diem_tbm||0);majorMap[x.major].cnt++;}});
      var byMajor=Object.keys(majorMap).map(function(k){return{name:k,avg:majorMap[k].cnt?majorMap[k].sum/majorMap[k].cnt:0};}).sort(function(a,b){return b.avg-a.avg;}).slice(0,10);
      var dTBM=af.filter(function(x){return x.diem_tbm;}).map(function(x){return x.diem_tbm;});
      var dTH=af.filter(function(x){return x.diem_tohop;}).map(function(x){return x.diem_tohop;});
      var dDGNL=af.filter(function(x){return x.diem_dgnl;}).map(function(x){return x.diem_dgnl;});
      var avgTBM=dTBM.length?(dTBM.reduce(function(a,b){return a+b;},0)/dTBM.length).toFixed(2):0;
      var avgTH=dTH.length?(dTH.reduce(function(a,b){return a+b;},0)/dTH.length).toFixed(2):0;
      var avgDGNL=dDGNL.length?Math.round(dDGNL.reduce(function(a,b){return a+b;},0)/dDGNL.length):0;
      var noCCCD=af.filter(function(x){return!x.cccd;}).length;
      var noEmail=af.filter(function(x){return!x.email;}).length;
      var tbmH=[{r:"6.0-6.5",v:dTBM.filter(function(x){return x>=6&&x<6.5;}).length},{r:"6.5-7.0",v:dTBM.filter(function(x){return x>=6.5&&x<7;}).length},{r:"7.0-7.5",v:dTBM.filter(function(x){return x>=7&&x<7.5;}).length},{r:"7.5-8.0",v:dTBM.filter(function(x){return x>=7.5&&x<8;}).length},{r:"8.0-8.5",v:dTBM.filter(function(x){return x>=8&&x<8.5;}).length},{r:"8.5+",v:dTBM.filter(function(x){return x>=8.5;}).length}];
      var thH=[{r:"18-20",v:dTH.filter(function(x){return x>=18&&x<20;}).length},{r:"20-22",v:dTH.filter(function(x){return x>=20&&x<22;}).length},{r:"22-24",v:dTH.filter(function(x){return x>=22&&x<24;}).length},{r:"24-26",v:dTH.filter(function(x){return x>=24&&x<26;}).length},{r:"26-28",v:dTH.filter(function(x){return x>=26&&x<28;}).length},{r:"28+",v:dTH.filter(function(x){return x>=28;}).length}];
      var radarData=byMajor.slice(0,6).map(function(m){return{subject:m.name,TBM:m.avg};});
      var xhbLine=(function(){var xd=af.filter(function(x){return x.status==="Xét Học bạ";});var allD=xd.map(function(x){return x.created_at;}).filter(Boolean);var uD=allD.filter(function(v,i,a){return a.indexOf(v)===i;}).sort().slice(-14);return uD.map(function(d){var row={ngay:d.slice(5)};TOL.forEach(function(t){row[t]=xd.filter(function(x){return x.created_at===d&&x.telesales===t;}).length;});return row;});})();
      var gpData=TOL.map(function(t){var obj={name:t};STL.forEach(function(s){obj[s]=af.filter(function(x){return x.telesales===t&&x.status===s;}).length;});return obj;});
      var tinhAllMap={};active.forEach(function(x){if(x.province)tinhAllMap[x.province]=(tinhAllMap[x.province]||0)+1;});
      var tinhL=["Tất cả"].concat(Object.keys(tinhAllMap).sort());
      var stL=["Tất cả"].concat(STL);
      var tsL=["Tất cả"].concat(TOL);
      var filtered=af.filter(function(d){var q=srch.toLowerCase();return(!q||String(d.name||"").toLowerCase().includes(q)||String(d.phone||"").includes(q))&&(fTinh==="Tất cả"||d.province===fTinh)&&(fTs==="Tất cả"||d.telesales===fTs)&&(fSt==="Tất cả"||d.status===fSt);}).sort(function(a,b){return sDir==="asc"?String(a[sCol]||"").localeCompare(String(b[sCol]||"")):String(b[sCol]||"").localeCompare(String(a[sCol]||""));});
      var pages=Math.max(1,Math.ceil(filtered.length/PAGE));
      var paged=filtered.slice((pg-1)*PAGE,pg*PAGE);

      var doFetch=useCallback(async function(){
        setSt("loading");
        try{
          var res=await fetch("https://royal-poetry-ba87.anhthai35789.workers.dev/_api/base-table/find",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({table:"data_customer",page:1,limit:500})});
          if(!res.ok)throw new Error("HTTP "+res.status);
          var json=await res.json();
          var rows=(json&&(json.data||json.result||json.records||json.list))||[];
          setData(Array.isArray(rows)?rows:[]);setSt(Array.isArray(rows)&&rows.length>0?"ok":"empty");setCd(POLL);
        }catch(e){setSt("cors");}
      },[]);

      useEffect(function(){if(!mock){doFetch();timerRef.current=setInterval(doFetch,POLL*1000);}else{setSt("ok");clearInterval(timerRef.current);}return function(){clearInterval(timerRef.current);};},[mock,doFetch]);
      useEffect(function(){clearInterval(cdRef.current);if(!mock&&st==="ok")cdRef.current=setInterval(function(){setCd(function(c){return c<=1?POLL:c-1;});},1000);return function(){clearInterval(cdRef.current);};},[st,mock]);

      function doSort(c){if(sCol===c)setSDir(function(d){return d==="asc"?"desc":"asc";});else{setSCol(c);setSDir("asc");}}
      function stColor(s){return s==="Xét Học bạ"?"#10b981":s==="Tiếp cận"?"#f59e0b":s==="Quan tâm"?"#8b5cf6":s==="Fail"?"#ef4444":"#3b82f6";}
      function exp(t,s,c){setModal({title:t,sub:s,content:c});}

      function showTinhDetail(tinhName){
        var rows=af.filter(function(x){return x.province===tinhName;});
        exp("Chi tiết: "+tinhName,rows.length.toLocaleString()+" hồ sơ",
          h("div",null,
            h("div",{style:{display:"flex",gap:12,marginBottom:20,flexWrap:"wrap"}},
              STL.map(function(s,i){
                var cnt=rows.filter(function(x){return x.status===s;}).length;
                var pct=rows.length?((cnt/rows.length)*100).toFixed(1):0;
                return h(KCard,{key:s,val:cnt.toLocaleString(),label:s,pct:pct+"% tổng tỉnh",color:C1[i]});
              })
            ),
            STL.map(function(s,i){
              var cnt=rows.filter(function(x){return x.status===s;}).length;
              var pct=rows.length?((cnt/rows.length)*100).toFixed(1):0;
              return h("div",{key:i,style:{display:"flex",alignItems:"center",gap:10,marginBottom:12}},
                h("span",{style:{width:100,fontSize:13,color:"#8b92a9",textAlign:"right",flexShrink:0}},s),
                h("div",{style:{flex:1,background:"#2d3148",borderRadius:4,height:32,overflow:"hidden",position:"relative"}},
                  h("div",{style:{width:pct+"%",height:"100%",background:C1[i],borderRadius:4}}),
                  h("span",{style:{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:"#fff",fontSize:13,fontWeight:700}},cnt.toLocaleString())
                ),
                h("span",{style:{fontSize:12,fontWeight:600,color:C1[i],minWidth:50,textAlign:"right"}},pct+"%")
              );
            })
          )
        );
      }

      async function handleAI(){
        setAiLd(true);setAiTxt("");
        try{var r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:"Chuyên gia tuyển sinh. Phân tích: 1)Tổng quan, 2)Cảnh báo, 3)Đề xuất. Tiếng Việt, emoji.",messages:[{role:"user",content:"Tổng:"+total+",XHB:"+xhb+",Fail:"+fail+",TBM:"+avgTBM+",CCCD:"+noCCCD+",Email:"+noEmail}]})});var d=await r.json();setAiTxt(d.content&&d.content[0]&&d.content[0].text||"Không có phản hồi.");}catch(e){setAiTxt("Lỗi AI.");}
        setAiLd(false);
      }

      async function handleFile(e){
        var file=e.target.files[0];if(!file)return;
        setUploadMsg("⏳ Đang đọc: "+file.name);setUploadPct(20);
        try{
          var buf=await file.arrayBuffer();setUploadPct(50);
          var wb=XLSX.read(buf,{type:"array"});var ws=wb.Sheets[wb.SheetNames[0]];setUploadPct(70);
          var rows=XLSX.utils.sheet_to_json(ws,{defval:""});setUploadPct(90);
          var mapped=rows.map(function(r,i){return{_id:"r"+i,name:r["Họ và tên"]||r["Họ tên"]||r["name"]||"",phone:String(r["Di động"]||r["Số điện thoại"]||r["phone"]||""),province:r["Tỉnh/ Thành phố"]||r["Tỉnh/Thành"]||r["tinh"]||"",major:r["NGÀNH ĐKXT NV1"]||r["Ngành NV1"]||r["major"]||"",status:r["Tiến trình"]||r["Trạng thái"]||r["status"]||"",telesales:r["Tổ"]||r["Telesales"]||r["Tổ tư vấn"]||"",kenh:r["Nguồn_DHV cấp 1"]||r["Kênh"]||r["Nguồn"]||"",cccd:r["Số CCCD/ Mã số định danh"]||r["CCCD"]||"",email:r["Email"]||r["email"]||"",diem_tbm:parseFloat(r["Điểm TBM"]||0)||0,diem_tohop:parseFloat(r["Điểm Tổ hợp môn"]||0)||0,diem_dgnl:parseFloat(r["Điểm DGNL"]||0)||0,xhb:(r["Tiến trình"]||"").toLowerCase().includes("xét học bạ")?"Có XHB":"Không XHB",created_at:r["Ngày"]||r["created_at"]||new Date().toISOString().split("T")[0]};});
          setUploadPct(100);setData(mapped);setMock(false);setSt("ok");
          setUploadMsg("✅ "+file.name+" — "+mapped.length.toLocaleString()+" bản ghi");setCurrentTab("funnel");
        }catch(err){setUploadMsg("❌ Lỗi: "+err.message);setUploadPct(0);}
      }

      return h("div",{style:{minHeight:"100vh",background:"#0e1117",fontFamily:"'Segoe UI',sans-serif",color:"#c8cde0",fontSize:13}},
        h(Modal,{modal,onClose:function(){setModal(null);}}),
        // Header
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",padding:"18px 24px 0",flexWrap:"wrap",gap:12}},
          h("div",null,
            h("h1",{style:{fontSize:22,fontWeight:800,color:"#fff",lineHeight:1.2,margin:0}},"Phân tích ",h("span",{style:{color:"#3b82f6"}},"Chuyên sâu"),h("br"),"Dữ liệu Thí sinh 2026"),
            h("div",{style:{fontSize:11,color:"#8b92a9",marginTop:6}},"ĐH Hùng Vương TP.HCM · ",(mock?"Demo":"Live"),st==="ok"&&!mock&&h("span",{style:{color:"#10b981",marginLeft:8}},"● Live · "+cd+"s"),mock&&h("span",{style:{color:"#8b5cf6",marginLeft:8}},"● Demo mode"))
          ),
          h("div",{style:{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}},
            h("div",{style:{display:"flex",flexDirection:"column",gap:2}},
              h("div",{style:{fontSize:10,color:"#8b92a9"}},"🗺️ Tỉnh/Thành"),
              h("div",{style:{display:"flex",gap:4}},
                h("button",{title:"Reset bộ lọc",onClick:function(){setFilterTo("Tất cả");setFTinh("Tất cả");},style:{background:"#2d3148",border:"1px solid #3b82f6",color:"#3b82f6",borderRadius:6,width:32,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}},"↺"),
                h("select",{value:fTinh,onChange:function(e){setFTinh(e.target.value);},style:Object.assign({},inp,{cursor:"pointer"})},tinhL.map(function(t){return h("option",{key:t},t);}))
              )
