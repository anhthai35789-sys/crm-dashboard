async function sign(ts) {
  const enc = new TextEncoder();
  const k = await crypto.subtle.importKey("raw",enc.encode(SECRET),{name:"HMAC",hash:"SHA-512"},false,["sign"]);
  const s = await crypto.subtle.sign("HMAC",k,enc.encode(ts+PROJECT));
  return Array.from(new Uint8Array(s)).map(b=>b.toString(16).padStart(2,"0")).join("");
}
async function apiFetch(table) {
  const ts=String(Date.now()), sg=await sign(ts);
  const r=await fetch(`${PROXY}/_api/base-table/find`,{method:"POST",headers:{"Content-Type":"application/json","cb-access-key":KEY,"cb-project-token":PROJECT,"cb-access-timestamp":ts,"cb-access-sign":sg},body:JSON.stringify({table,page:1,limit:500})});
  if(!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

const CustomBarLabel=({x,y,width,value})=>{
  if(!value||width<18) return null;
  return <text x={x+width/2} y={y-5} fill="#e8eaf0" textAnchor="middle" fontSize={11} fontWeight={600}>{value}</text>;
};
const CustomPieLabel=({cx,cy,midAngle,innerRadius,outerRadius,value,percent})=>{
  if(percent<0.04) return null;
  const R=Math.PI/180,r=innerRadius+(outerRadius-innerRadius)*0.5;
  const x=cx+r*Math.cos(-midAngle*R),y=cy+r*Math.sin(-midAngle*R);
  return <text x={x} y={y} fill="#fff" textAnchor="middle" dominantBaseline="central" fontSize={11} fontWeight={700}>{value}</text>;
};

              <CartesianGrid strokeDasharray="3 3" stroke="#2d3148"/>
              <XAxis dataKey="name" tick={{fill:"#8b92a9",fontSize:11}} axisLine={false} tickLine={false}/>
              <YAxis yAxisId="left" tick={{fill:"#8b92a9",fontSize:11}} axisLine={false} tickLine={false}/>
              <Tooltip {...TT}/>
              <Bar yAxisId="left" dataKey="total" fill="#2d3a5a" radius={[3,3,0,0]} name="Tổng"><LabelList dataKey="total" content={CustomBarLabel}/></Bar>
              <Bar yAxisId="left" dataKey="xhb" fill="#10b981" radius={[3,3,0,0]} name="Xét Học bạ"><LabelList dataKey="xhb" content={CustomBarLabel}/></Bar>
            </ComposedChart>
          </ResponsiveContainer>
        </SCard>
      </div>}

      {/* KÊNH */}
      {tab==="kenh"&&<div>
        <div style={{display:"flex",gap:12,marginBottom:16,flexWrap:"wrap"}}>
          <KCard val={`${total?((active.filter(x=>x.cccd).length/total)*100).toFixed(1):0}%`} label="CÓ CCCD" color="#3b82f6"/>
          <KCard val={`${total?((noCCCD/total)*100).toFixed(1):0}%`} label="THIẾU CCCD" color="#ef4444"/>
          <KCard val={`${total?((active.filter(x=>x.email).length/total)*100).toFixed(1):0}%`} label="CÓ EMAIL" color="#10b981"/>
          <KCard val={`${total?((noEmail/total)*100).toFixed(1):0}%`} label="THIẾU EMAIL" color="#f59e0b"/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          <SCard title="Nguồn cấp 1 – Hiệu quả tuyển sinh" sub="Tổng hồ sơ và XHB theo kênh">
            <ResponsiveContainer width="100%" height={240}>
              <ComposedChart data={byKenh} margin={{top:20,right:30,left:-20,bottom:40}}>
                <CartesianGrid strokeDasharray="3 3" stroke="#2d3148"/>
                <XAxis dataKey="name" tick={{fill:"#8b92a9",fontSize:9,angle:-30,textAnchor:"end"}} axisLine={false} tickLine={false}/>
                <YAxis yAxisId="left" tick={{fill:"#8b92a9",fontSize:10}} axisLine={false} tickLine={false}/>
                <Tooltip {...TT}/>
                <Bar yAxisId="left" dataKey="total" fill="#2d3a5a" radius={[3,3,0,0]} name="Tổng"><LabelList dataKey="total" content={CustomBarLabel}/></Bar>
                <Bar yAxisId="left" dataKey="xhb" fill="#10b981" radius={[3,3,0,0]} name="XHB"><LabelList dataKey="xhb" content={CustomBarLabel}/></Bar>
              </ComposedChart>
            </ResponsiveContainer>
          </SCard>
          <SCard title="Nguồn cấp 1 – Phân bổ hồ sơ" sub="Tỷ trọng từng kênh">
            <ResponsiveContainer width="100%" height={260}>
              <PieChart>
                <Pie data={byKenh} cx="40%" cy="45%" innerRadius={65} outerRadius={105} dataKey="total" nameKey="name" labelLine={false} label={CustomPieLabel}>
                  {byKenh.map((_,i)=><Cell key={i} fill={C1[i]}/>)}
                </Pie>
                <Tooltip {...TT}/>
              </PieChart>
            </ResponsiveContainer>
            <div style={{display:"flex",flexWrap:"wrap",gap:"4px 12px",justifyContent:"center"}}>
              {byKenh.map((k,i)=><span key={i} style={{display:"flex",alignItems:"center",gap:4,fontSize:11,color:"#8b92a9"}}><span style={{width:8,height:8,borderRadius:2,background:C1[i],display:"inline-block"}}/>{k.name}</span>)}
            </div>
          </SCard>
        </div>
      </div>}

      {/* ĐIỂM */}
      {tab==="diem"&&<div>
        <div style={{display:"flex",gap:12,marginBottom:16,flexWrap:"wrap"}}>
          <KCard val={avgTBM} label="TBM TRUNG BÌNH" sub="Thang 0-10" color="#3b82f6"/>
          <KCard val={avgTH} label="TỔ HỢP TB" sub="Thang 0-30" color="#10b981"/>
          <KCard val={avgDGNL} label="ĐGNL TB" sub="Thang 0-1200" color="#8b5cf6"/>
          <KCard val={diemTBM.length} label="CÓ ĐIỂM TBM" color="#f59e0b"/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:14}}>
          <SCard title="Điểm TBM Trung bình theo Ngành (Top 10)" sub="Điểm trung bình môn từng ngành">
            <ResponsiveContainer width="100%" height={280}>
              <BarChart data={byMajor} layout="vertical" margin={{top:0,right:60,left:100,bottom:0}}>
                <CartesianGrid strokeDasharray="3 3" stroke="#2d3148" horizontal={false}/>
                <XAxis type="number" domain={[6,11]} tick={{fill:"#8b92a9",fontSize:10}} axisLine={false} tickLine={false}/>
                <YAxis dataKey="name" type="category" tick={{fill:"#8b92a9",fontSize:10}} axisLine={false} tickLine={false} width={95}/>
                <Tooltip {...TT}/>
                <Bar dataKey="avg" radius={[0,4,4,0]} name="Điểm TBM">
                  <LabelList dataKey="avg" position="insideRight" formatter={v=>Number(v).toFixed(2)} style={{fill:"#fff",fontSize:11,fontWeight:700}}/>
                  {byMajor.map((_,i)=><Cell key={i} fill={i===0?"#ef4444":i===byMajor.length-1?"#10b981":"#3b82f6"}/>)}
                </Bar>
              </BarChart>
            </ResponsiveContainer>
          </SCard>
          <SCard title="So sánh điểm theo Ngành" sub="Radar TBM từng ngành">
            <ResponsiveContainer width="100%" height={280}>
              <RadarChart data={radarData} margin={{top:10,right:30,left:30,bottom:10}}>
                <PolarGrid stroke="#2d3148"/>
                <PolarAngleAxis dataKey="subject" tick={({x,y,payload,cx,cy})=>{
                  const val=radarData.find(d=>d.subject===payload.value)?.TBM;
                  return<g>
                    <text x={x} y={y} textAnchor={x>cx?"start":x<cx?"end":"middle"} dominantBaseline="central" fill="#8b92a9" fontSize={10}>{payload.value}</text>
                    <text x={x} y={y+13} textAnchor={x>cx?"start":x<cx?"end":"middle"} dominantBaseline="central" fill="#f59e0b" fontSize={11} fontWeight={700}>{val?Number(val).toFixed(2):""}</text>
                  </g>;
                }}/>
                <Radar name="TBM" dataKey="TBM" stroke="#3b82f6" fill="#3b82f6" fillOpacity={0.35} dot={{fill:"#3b82f6",r:4}}/>
                <Tooltip {...TT} formatter={v=>Number(v).toFixed(2)}/>
              </RadarChart>
            </ResponsiveContainer>
          </SCard>
        </div>
      </div>}

      {/* ĐỊA LÝ */}
      {tab==="dialy"&&<div>
        <div style={{display:"flex",gap:12,marginBottom:16,flexWrap:"wrap"}}>
          <KCard val={byTinh[0]?.value?.toLocaleString()||0} label={byTinh[0]?.name||"TP.HCM"} pct={`${total?((byTinh[0]?.value||0)/total*100).toFixed(1):0}% tổng`} color="#3b82f6"/>
          <KCard val={byTinh[1]?.value?.toLocaleString()||0} label={byTinh[1]?.name||""} pct="Đứng thứ 2" color="#10b981"/>
          <KCard val={byTinh[2]?.value?.toLocaleString()||0} label={byTinh[2]?.name||""} pct="Đứng thứ 3" color="#f59e0b"/>
          <KCard val={byTinh.length} label="TỈNH/THÀNH PHỐ" color="#8b5cf6"/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          <SCard title="Phân bổ theo Tỉnh/Thành phố" sub="Top 10 tỉnh thành">
            <ResponsiveContainer width="100%" height={280}>
              <BarChart data={byTinh.slice(0,10)} layout="vertical" margin={{top:0,right:50,left:90,bottom:0}}>
                <CartesianGrid strokeDasharray="3 3" stroke="#2d3148" horizontal={false}/>
                <XAxis type="number" tick={{fill:"#8b92a9",fontSize:10}} axisLine={false} tickLine={false}/>
                <YAxis dataKey="name" type="category" tick={{fill:"#8b92a9",fontSize:10}} axisLine={false} tickLine={false}/>
                <Tooltip {...TT}/>
                <Bar dataKey="value" radius={[0,4,4,0]} name="Hồ sơ">
                  <LabelList dataKey="value" position="right" style={{fill:"#e8eaf0",fontSize:11,fontWeight:600}}/>
                  {byTinh.slice(0,10).map((_,i)=><Cell key={i} fill={C1[i%10]}/>)}
                </Bar>
              </BarChart>
            </ResponsiveContainer>
          </SCard>
          <SCard title="Top 8 Tỉnh – Tỷ trọng hồ sơ" sub="Phần trăm theo tỉnh thành">
            <ResponsiveContainer width="100%" height={280}>
              <PieChart>
                <Pie data={byTinh.slice(0,8)} cx="40%" cy="45%" innerRadius={60} outerRadius={105} dataKey="value" nameKey="name" labelLine={false} label={CustomPieLabel}>
                  {byTinh.slice(0,8).map((_,i)=><Cell key={i} fill={C1[i]}/>)}
                </Pie>
                <Tooltip {...TT}/>
              </PieChart>
            </ResponsiveContainer>
            <div style={{display:"flex",flexWrap:"wrap",gap:"4px 10px",justifyContent:"center"}}>
              {byTinh.slice(0,8).map((t,i)=><span key={i} style={{display:"flex",alignItems:"center",gap:4,fontSize:10,color:"#8b92a9"}}><span style={{width:7,height:7,borderRadius:2,background:C1[i],display:"inline-block"}}/>{t.name}</span>)}
            </div>
          </SCard>
        </div>
      </div>}

      {/* PHÂN TÍCH 3 LOẠI ĐIỂM */}
      {tab==="phanloai"&&<div>
        <div style={{display:"flex",gap:12,marginBottom:16,flexWrap:"wrap"}}>
          <KCard val={diemTBM.length.toLocaleString()} label="CÓ ĐIỂM TBM" pct={`${total?((diemTBM.length/total)*100).toFixed(1):0}%`} color="#3b82f6"/>
          <KCard val={diemTH.length.toLocaleString()} label="CÓ TỔ HỢP" pct={`${total?((diemTH.length/total)*100).toFixed(1):0}%`} color="#10b981"/>
          <KCard val={diemDGNL.length.toLocaleString()} label="CÓ ĐGNL" pct={`${total?((diemDGNL.length/total)*100).toFixed(1):0}%`} color="#8b5cf6"/>
          <KCard val={avgDGNL} label="TB ĐIỂM ĐGNL" color="#f59e0b"/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:14,marginBottom:14}}>
          <SCard title="Điểm TBM (Học bạ)" sub={`Trung bình: ${avgTBM} · Thang 0-10`}>
            <ResponsiveContainer width="100%" height={180}>
              <BarChart data={tbmHist} margin={{top:20,right:0,left:-25,bottom:0}}>
                <XAxis dataKey="r" tick={{fill:"#8b92a9",fontSize:9}} axisLine={false} tickLine={false}/>
                <YAxis tick={{fill:"#8b92a9",fontSize:9}} axisLine={false} tickLine={false}/>
                <Tooltip {...TT}/>
                <Bar dataKey="v" name="Thí sinh"><LabelList dataKey="v" content={CustomBarLabel}/>{tbmHist.map((_,i)=><Cell key={i} fill={["#ef4444","#f59e0b","#10b981","#3b82f6","#8b5cf6","#06b6d4"][i]}/>)}</Bar>
              </BarChart>
            </ResponsiveContainer>
          </SCard>
          <SCard title="Điểm Tổ hợp môn" sub={`Trung bình: ${avgTH} · Thang 0-30`}>
            <ResponsiveContainer width="100%" height={180}>
              <BarChart data={thHist} margin={{top:20,right:0,left:-25,bottom:0}}>
                <XAxis dataKey="r" tick={{fill:"#8b92a9",fontSize:9}} axisLine={false} tickLine={false}/>
                <YAxis tick={{fill:"#8b92a9",fontSize:9}} axisLine={false} tickLine={false}/>
                <Tooltip {...TT}/>
                <Bar dataKey="v" name="Thí sinh"><LabelList dataKey="v" content={CustomBarLabel}/>{thHist.map((_,i)=><Cell key={i} fill={["#ef4444","#f59e0b","#10b981","#3b82f6","#8b5cf6","#06b6d4"][i]}/>)}</Bar>
              </BarChart>
            </ResponsiveContainer>
          </SCard>
          <SCard title="Điểm ĐGNL" sub={`Trung bình: ${avgDGNL} · Thang 0-1200`}>
            {[["< 650","#ef4444",[0,650]],[" 650-750","#f59e0b",[650,750]],["750-850","#10b981",[750,850]],["850+","#3b82f6",[850,9999]]].map(([r,c,range],i)=>{
              const cnt=diemDGNL.filter(x=>x>=range[0]&&x<range[1]).length;
              const pct=diemDGNL.length?((cnt/diemDGNL.length)*100).toFixed(0):0;
              return<div key={i} style={{display:"flex",alignItems:"center",gap:8,marginTop:10}}>
                <span style={{width:60,fontSize:11,color:"#8b92a9",flexShrink:0}}>{r}</span>
                <div style={{flex:1,background:"#2d3148",borderRadius:3,height:22,overflow:"hidden",position:"relative"}}>
                  <div style={{width:pct+"%",height:"100%",background:c,borderRadius:3}}/>
                  <span style={{position:"absolute",left:8,top:"50%",transform:"translateY(-50%)",color:"#fff",fontSize:11,fontWeight:700}}>{cnt}</span>
                </div>
                <span style={{fontSize:10,color:"#8b92a9",minWidth:28,textAlign:"right"}}>{pct}%</span>
              </div>;
            })}
          </SCard>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 2fr",gap:14}}>
          <SCard title="Tỷ lệ phổ theo phương thức xét tuyển">
            <ResponsiveContainer width="100%" height={180}>
              <BarChart data={[{name:"Điểm TBM",co:diemTBM.length,k:total-diemTBM.length},{name:"Tổ hợp",co:diemTH.length,k:total-diemTH.length},{name:"ĐGNL",co:diemDGNL.length,k:total-diemDGNL.length}]} margin={{top:20,right:0,left:-20,bottom:0}}>
                <XAxis dataKey="name" tick={{fill:"#8b92a9",fontSize:10}} axisLine={false} tickLine={false}/>
                <YAxis tick={{fill:"#8b92a9",fontSize:10}} axisLine={false} tickLine={false}/>
                <Tooltip {...TT}/>
                <Bar dataKey="co" fill="#3b82f6" name="Có điểm" stackId="a"><LabelList dataKey="co" content={CustomBarLabel}/></Bar>
                <Bar dataKey="k" fill="#2d3148" name="Không có" stackId="a"/>
              </BarChart>
            </ResponsiveContainer>
          </SCard>
          <SCard title="Điểm TBM: XHB và Không XHB" sub="So sánh điểm trung bình 2 nhóm">
            <div style={{display:"flex",gap:12,marginTop:8}}>
              {[{g:"Có XHB",c:"#10b981"},{g:"Không XHB",c:"#ef4444"}].map((g,i)=>{
                const group=active.filter(x=>x.xhb===g.g&&x.diem_tbm);
                const avg=group.length?(group.reduce((a,x)=>a+(x.diem_tbm||0),0)/group.length).toFixed(2):0;
                return<div key={i} style={{flex:1,background:"#1a2540",border:`1px solid ${g.c}44`,borderRadius:8,padding:"20px",textAlign:"center"}}>
                  <div style={{fontSize:36,fontWeight:800,color:g.c}}>{avg}</div>
                  <div style={{fontSize:12,color:"#8b92a9",marginTop:6}}>{g.g}</div>
                  <div style={{fontSize:11,color:"#8b92a9"}}>{group.length} thí sinh</div>
                </div>;
              })}
            </div>
          </SCard>
        </div>
      </div>}

      {/* AI */}
      {tab==="ai"&&<div style={{maxWidth:800}}>
        <div style={{background:"#1a1f35",border:"1px solid #3b82f688",borderRadius:10,padding:"20px",marginBottom:14}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
            <span style={{fontSize:28}}>🤖</span>
            <div>
              <div style={{fontWeight:700,color:"#e8eaf0",fontSize:15}}>AI Insight — Phân tích Chuyên sâu</div>
              <div style={{fontSize:11,color:"#8b92a9",marginTop:2}}>{total.toLocaleString()} hồ sơ · Claude AI</div>
            </div>
          </div>
          <button onClick={handleAI} disabled={aiLd} style={{background:aiLd?"#2d3148":"linear-gradient(135deg,#3b82f6,#8b5cf6)",border:"none",color:"#fff",borderRadius:8,padding:"11px 0",fontSize:14,fontWeight:600,width:"100%",opacity:aiLd?.7:1}}>
            {aiLd?"⏳ Đang phân tích...":"✨ Phân tích ngay"}
          </button>
        </div>
        {aiTxt&&<div style={{background:"#161b2e",border:"1px solid #2d3148",borderRadius:10,padding:"20px"}}>
          <div style={{fontSize:12,color:"#3b82f6",fontWeight:700,marginBottom:12}}>🤖 Kết quả</div>
          <div style={{fontSize:13,color:"#c8cde0",lineHeight:1.9,whiteSpace:"pre-wrap"}}>{aiTxt}</div>
        </div>}
      </div>}

      {/* DATA */}
      {tab==="data"&&<div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"flex-end",marginBottom:10}}>
          <div style={{flex:1,minWidth:160}}>
            <div style={{fontSize:10,color:"#8b92a9",marginBottom:3}}>🔍 Tìm kiếm</div>
            <input placeholder="Tên, SĐT..." value={srch} onChange={e=>{setSrch(e.target.value);setPg(1);}} style={{width:"100%"}}/>
          </div>
          {[[tinhL,fTinh,setFTinh,"🗺️ Tỉnh/Thành"],[stL,fSt,setFSt,"📌 Tiến trình"],[tsL,fTs,setFTs,"👤 Tổ tư vấn"]].map(([list,val,setter,label],i)=>(
            <div key={i}>
              <div style={{fontSize:10,color:"#8b92a9",marginBottom:3}}>{label}</div>
              <select value={val} onChange={e=>{setter(e.target.value);setPg(1);}}>
                {list.map(t=><option key={t}>{t}</option>)}
              </select>
            </div>
          ))}
          <span style={{fontSize:11,color:"#8b92a9",paddingBottom:6}}>{filtered.length} kết quả</span>
        </div>
        <div style={{background:"#161b2e",border:"1px solid #2d3148",borderRadius:10,overflow:"hidden"}}>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead>
                <tr style={{background:"#0e1117"}}>
                  {[["name","Họ tên"],["phone","SĐT"],["province","Tỉnh"],["major","Ngành"],["status","Trạng thái"],["telesales","Tổ"],["diem_tbm","TBM"],["cccd","CCCD"],["email","Email"],["created_at","Ngày"]].map(([c,l])=>(
                    <th key={c} onClick={()=>doSort(c)} style={thS}>{l}{sCol===c?(sDir==="asc"?" ↑":" ↓"):""}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {paged.length===0?<tr><td colSpan={10} style={{padding:"24px",textAlign:"center",color:"#8b92a9"}}>Không có dữ liệu</td></tr>
                :paged.map((r,i)=>(
                  <tr key={i} style={{borderBottom:"1px solid #1a1f35",background:i%2===0?"transparent":"#111620"}}>
                    <td style={{...tdS,color:"#e8eaf0",fontWeight:500}}>{r.name||"—"}</td>
                    <td style={tdS}>{r.phone||"—"}</td>
                    <td style={tdS}>{r.province||"—"}</td>
                    <td style={tdS}><span style={{background:"#2d3148",borderRadius:4,padding:"2px 7px",fontSize:10}}>{r.major||"—"}</span></td>
                    <td style={tdS}><span style={{borderRadius:4,padding:"2px 6px",color:sc(r.status),background:sc(r.status)+"22",fontSize:10}}>{r.status||"—"}</span></td>
                    <td style={tdS}>{r.telesales||"—"}</td>
                    <td style={{...tdS,color:"#f59e0b",fontWeight:600}}>{r.diem_tbm?Number(r.diem_tbm).toFixed(2):"—"}</td>
                    <td style={tdS}><span style={{color:r.cccd?"#10b981":"#ef4444",fontWeight:700}}>{r.cccd?"✓":"✗"}</span></td>
                    <td style={tdS}><span style={{color:r.email?"#10b981":"#ef4444",fontWeight:700}}>{r.email?"✓":"✗"}</span></td>
                    <td style={{...tdS,color:"#8b92a9"}}>{r.created_at||"—"}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:10}}>
          <span style={{fontSize:11,color:"#8b92a9"}}>Trang {pg}/{pages} · {filtered.length} bản ghi</span>
          <div style={{display:"flex",gap:4}}>
            <button onClick={()=>setPg(p=>Math.max(1,p-1))} disabled={pg===1} style={{background:"#1e2130",border:"1px solid #2d3148",color:"#c8cde0",borderRadius:5,padding:"4px 10px",fontSize:12,opacity:pg===1?.4:1}}>‹</button>
            {Array.from({length:Math.min(pages,7)},(_,i)=>i+1).map(p=>(
              <button key={p} onClick={()=>setPg(p)} style={{background:p===pg?"#3b82f6":"#1e2130",border:`1px solid ${p===pg?"#3b82f6":"#2d3148"}`,color:p===pg?"#fff":"#c8cde0",borderRadius:5,padding:"4px 8px",fontSize:12,minWidth:28}}>{p}</button>
            ))}
            <button onClick={()=>setPg(p=>Math.min(pages,p+1))} disabled={pg===pages} style={{background:"#1e2130",border:"1px solid #2d3148",color:"#c8cde0",borderRadius:5,padding:"4px 10px",fontSize:12,opacity:pg===pages?.4:1}}>›</button>
          </div>
        </div>
      </div>}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
